server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
  - http://localhost:3000
  - http://localhost:5173
auth:
  api_keys:
  # Bootstrap key (No delete) — Gateway 自身的访问密钥，非 LLM 提供商 API Key
  # 客户端请求 Gateway 时通过 Authorization: Bearer <此 key> 认证
  - key: gw-rRIop4dpcyJJNUTJbHmHpr9Bj3M11s5o
    user_id: admin
    is_admin: true
    group: admin-team
    quotas:
      daily_tokens: 1000000
      monthly_cost: 50.0
      rate_limit_rpm: 60
      rate_limit_tpm: 100000
  distributed_mode: false
  defaults:
    daily_tokens: 1000000
    monthly_cost: 50.0
    rate_limit_rpm: 60
    rate_limit_tpm: 100000
  budget_alert_threshold: 0.8
plugins:
- name: pii_detector
  enabled: true
  depends_on: []
  config:
    strategy: sanitize
- name: prompt_cache
  enabled: true
  depends_on: []
  config: {}
- name: semantic_cache
  enabled: true
  depends_on:
  - prompt_cache
  config:
    embedding_model: Qwen/Qwen3-Embedding-0.6B
    threshold: 0.95
    ttl: 86400
    rerank:
      enabled: false
      backend: lightweight
      retrieve_top_k: 5
      retrieve_threshold: 0.9
      rerank_threshold: 0.85
- name: model_router
  enabled: true
  depends_on: []
  config: {}
- name: prompt_compress
  enabled: true
  depends_on: ["semantic_cache"]
  config:
    compression_ratio: 0.5
    model_name: "microsoft/llmlingua-2-bert-base-multilingual-cased-meetingbank"
    target_token: -1
    device: cpu
- name: rag_retriever
  enabled: false
  depends_on: ["semantic_cache"]
  config:
    top_k: 5
    similarity_threshold: 0.7
    rerank_enabled: false
    chunk_size: 512
    chunk_overlap: 64
    collection_name: rag_documents
- name: conv_compressor
  enabled: false
  depends_on: ["semantic_cache"]
  config:
    max_history: 20
    summary_model: gpt-4o-mini
    max_token_limit: 4000
    summary_interval: 5
providers:
  agnes:
    api_key: sk-Idz9oi7Cvx946OY6ipSp5FjU0T1S8IHQXRnVAnu2j1Q2zPBK
    base_url: https://apihub.agnes-ai.com/v1
    model_grouper:
    - models:
      - agnes-2.0-flash
      - agnes-image-2.1-flash
      - agnes-video-v2.0
      fallback_models: []
      pricing:
        agnes-2.0-flash:
          prompt: 0.02
          completion: 1
    num_retries: 3
    retry_after: 1000
    timeout: 3600
  deepseek:
    api_key: sk-d10ef482afad4b86a37f680ddb336d37
    base_url: https://api.deepseek.com/v1
    model_grouper:
    - models:
      - deepseek-v4-flash
      fallback_models: []
      pricing:
        deepseek-v4-flash:
          prompt: 0.02
          completion: 1
    num_retries: 3
    retry_after: 1000
    timeout: 120
embedding:
  backend: sentence_transformers
  model: Qwen/Qwen3-Embedding-0.6B
  vector_dim: 1024
  openai_model: text-embedding-3-small
observability:
  prometheus_enabled: true
  opentelemetry_enabled: true
  otel_service_name: ai-gateway
  otel_sample_rate: 0.1
  log_format: json
  log_level: info
infrastructure:
  redis:
    url: ${AI_GATEWAY_REDIS_URL:-redis://localhost:6379/0}
    connect_timeout: 5
    socket_timeout: 10
    health_check_interval: 30
    rpm_key_ttl: 120
    tpm_window_ttl: 60
  qdrant:
    url: ${AI_GATEWAY_QDRANT_URL:-http://localhost:6333}
    connect_timeout: 5
    read_timeout: 10
    write_timeout: 10
    hnsw_m: 16
    hnsw_ef_construct: 128
cache:
  l1:
    max_entries: 1000
    max_value_bytes: 102400
  l2:
    max_value_bytes: 512000
    default_ttl: 3600
    compression_level: 9
  l3:
    min_token_count: 100
    default_ttl: 86400
    cleanup_interval: 3600
    similarity_threshold: 0.95
    rerank:
      enabled: false
      model: cross-encoder/ms-marco-MiniLM-L-6-v2
      retrieve_top_k: 5
      retrieve_threshold: 0.9
      rerank_threshold: 0.85
circuit_breaker:
  failure_threshold: 5
  recovery_timeout: 60
  long_open_alert_seconds: 300
rate_limiter:
  max_requests: 30
  window_seconds: 60
streaming:
  cache_chunk_delay_ms: 20
  cache_chunk_count: 20
hot_reload: true
debug_mode: false
media_optimization:
  enabled: true
  download_timeouts:
    image: 30
    video: 120
    audio: 60
    document: 60
  image:
    max_width: 1920
    max_height: 1080
    quality: 85
    output_format: webp
    ocr_backend: tesseract
    ocr_languages:
    - eng
    - chi_sim
    caption_model: gpt-4o
    max_file_size_mb: 20.0
    caption_max_tokens: 150
    caption_temperature: 0.3
    paddleocr:
      lang: ch
      use_angle_cls: true
  video:
    max_frames: 10
    frame_interval_sec: 5.0
    scene_detection: true
    target_resolution: 720p
    max_duration_sec: 300
    whisper_model: faster-whisper
    language: auto
    max_file_size_mb: 100.0
  audio:
    target_format: opus
    sample_rate: 16000
    bitrate: 64k
    whisper_model: faster-whisper
    language: auto
    max_duration_sec: 600
    diarization_enabled: false
    max_file_size_mb: 50.0
    whisper_model_size: base
  document:
    supported_formats:
    - pdf
    - docx
    - xlsx
    - pptx
    - md
    - csv
    - html
    ocr_fallback: true
    chunk_size: 512
    chunk_overlap: 64
    chunking_strategy: semantic
    embedding_model: Qwen/Qwen3-Embedding-0.6B
    vector_dim: 1024
    summary_max_length: 500
    max_file_size_mb: 50.0
    long_doc_threshold_chars: 5000
    summary_preview_chars: 2000
    unstructured:
      strategy: auto
      languages: ["chi_sim", "eng"]
      extract_images: false
  generation:
    enhancement_level: 'off'
    vision_model: gpt-4o
    default_model: gpt-4o
  media_cache_ttl: 604800
  max_concurrent_processors: 4
generation_optimization:
  token_compressor:
    clip:
      model_name: "openai/clip-vit-large-patch14"
      device: cpu
      batch_size: 1
  draft_workflow:
    comfyui:
      server_url: "http://localhost:8188"
      connect_timeout: 10
      execution_timeout: 300
