server:
  host: 0.0.0.0
  port: 8000
  workers: 1
  cors_origins:
  - http://localhost:3000
  - http://localhost:5173
auth:
  api_keys:
  - key: sk-a1b2c3d4e5f6XDFDDSF12nco
    user_id: admin
    is_admin: true
    quotas:
      daily_tokens: 1000000
      monthly_cost: 50.0
      rate_limit_rpm: 60
      rate_limit_tpm: 100000
  distributed_mode: false
plugins:
- name: pii_detector
  enabled: true
  depends_on: []
  config:
    strategy: sanitize
- name: prompt_cache
  enabled: true
  depends_on: []
  config: {}
- name: semantic_cache
  enabled: true
  depends_on:
  - prompt_cache
  config:
    embedding_model: Qwen/Qwen3-Embedding-0.6B
    threshold: 0.95
    ttl: 86400
    rerank:
      enabled: false
      backend: lightweight
      retrieve_top_k: 5
      retrieve_threshold: 0.9
      rerank_threshold: 0.85
- name: model_router
  enabled: true
  depends_on: []
  config: {}
- name: prompt_compress
  enabled: true
  depends_on: []
  config:
    compression_ratio: 0.5
providers:
  agnes:
    api_key: sk-Idz9oi7Cvx946OY6ipSp5FjU0T1S8IHQXRnVAnu2j1Q2zPBK
    base_url: https://apihub.agnes-ai.com/v1
    model_grouper:
    - models:
      - agnes-2.0-flash
      - agnes-image-2.1-flash
      - agnes-video-v2.0
      fallback_models: []
      pricing:
        agnes-2.0-flash:
          prompt: 0.02
          completion: 1
    num_retries: 3
    retry_after: 1000
  deepseek:
    api_key: sk-d10ef482afad4b86a37f680ddb336d37
    base_url: https://api.deepseek.com/v1
    model_grouper:
    - models:
      - deepseek-v4-flash
      fallback_models: []
      pricing:
        deepseek-v4-flash:
          prompt: 0.02
          completion: 1
    num_retries: 3
    retry_after: 1000
embedding:
  backend: sentence_transformers
  model: Qwen/Qwen3-Embedding-0.6B
  vector_dim: 1024
  openai_model: text-embedding-3-small
observability:
  prometheus_enabled: true
  opentelemetry_enabled: true
  otel_service_name: ai-gateway
  otel_sample_rate: 0.1
  log_format: json
  log_level: info
hot_reload: true
debug_mode: false
media_optimization:
  enabled: true
  image:
    max_width: 1920
    max_height: 1080
    quality: 85
    output_format: webp
    ocr_backend: tesseract
    ocr_languages:
    - eng
    - chi_sim
    caption_model: gpt-4o
    max_file_size_mb: 20.0
  video:
    max_frames: 10
    frame_interval_sec: 5.0
    scene_detection: true
    target_resolution: 720p
    max_duration_sec: 300
    whisper_model: faster-whisper
    language: auto
    max_file_size_mb: 100.0
  audio:
    target_format: opus
    sample_rate: 16000
    bitrate: 64k
    whisper_model: faster-whisper
    language: auto
    max_duration_sec: 600
    diarization_enabled: false
    max_file_size_mb: 50.0
  document:
    supported_formats:
    - pdf
    - docx
    - xlsx
    - pptx
    - md
    - csv
    - html
    ocr_fallback: true
    chunk_size: 512
    chunk_overlap: 64
    chunking_strategy: semantic
    embedding_model: Qwen/Qwen3-Embedding-0.6B
    vector_dim: 1024
    summary_max_length: 500
    max_file_size_mb: 50.0
  generation:
    enhancement_level: 'off'
    vision_model: gpt-4o
    default_model: gpt-4o
  media_cache_ttl: 604800
  max_concurrent_processors: 4
