server:
  host: 0.0.0.0
  port: 8000
  workers: 4
auth:
  api_keys:
  - key: sk-dev-a1b2c3d4e5f6
    user_id: dev-user
    quotas:
      daily_tokens: 1000000
      monthly_cost: 50.0
      rate_limit_rpm: 60
      rate_limit_tpm: 100000
  distributed_mode: false
plugins:
- name: pii_detector
  enabled: true
  depends_on: []
  config:
    strategy: sanitize
- name: prompt_cache
  enabled: true
  depends_on: []
  config: {}
- name: semantic_cache
  enabled: true
  depends_on:
  - prompt_cache
  config:
    embedding_model: all-MiniLM-L6-v2
- name: model_router
  enabled: true
  depends_on: []
  config: {}
- name: prompt_compress
  enabled: true
  depends_on: []
  config:
    compression_ratio: 0.5
providers:
  openai:
    api_key: sk-proj-xxx
    model_grouper:
    - models:
      - gpt-4o
      - gpt-4o-mini
      fallback_models:
      - gpt-3.5-turbo
      pricing:
        gpt-4o:
          prompt: 5.0e-06
          completion: 1.5e-05
        gpt-4o-mini:
          prompt: 1.5e-07
          completion: 6.0e-07
        gpt-3.5-turbo:
          prompt: 1.5e-06
          completion: 2.0e-06
    num_retries: 3
    retry_after: 1000
  anthropic:
    api_key: sk-ant-xxx
    model_grouper:
    - models:
      - claude-3-5-sonnet
      fallback_models:
      - claude-3-sonnet
      pricing:
        claude-3-5-sonnet:
          prompt: 3.0e-06
          completion: 1.5e-05
        claude-3-sonnet:
          prompt: 1.5e-06
          completion: 7.5e-06
    num_retries: 3
    retry_after: 1000
  agnes:
    api_key: sk-Idz9oi7Cvx946OY6ipSp5FjU0T1S8IHQXRnVAnu2j1Q2zPBK
    base_url: https://apihub.agnes-ai.com/v1
    model_grouper:
    - models:
      - agnes-2.0-flash
      fallback_models: []
      pricing:
        agnes-2.0-flash:
          prompt: 3.0e-06
          completion: 1.5e-05
    num_retries: 3
    retry_after: 1000
embedding:
  backend: sentence_transformers
  model: all-MiniLM-L6-v2
  openai_model: text-embedding-3-small
observability:
  prometheus_enabled: true
  opentelemetry_enabled: true
  otel_service_name: ai-gateway
  otel_sample_rate: 0.1
  log_format: json
  log_level: info
api_keys: sk-dev-a1b2c3d4e5f6
config_path: ./config.yaml
embedding_backend: sentence_transformers
host: 0.0.0.0
log_level: info
otel_sample_rate: 0.1
port: 8000
prometheus_enabled: true
qdrant_url: http://qdrant:6333
redis_url: redis://redis:6379/0
workers: 4
