# ============================================================
# 构建加速:启用 BuildKit(并行层构建 + 增量上下文传输)
#   set -a && source .env.docker && set +a && docker compose ...
#   或直接:sudo DOCKER_BUILDKIT=1 docker compose up -d --build gateway
# .dockerignore 已排除 .venv/node_modules/.git 等,构建上下文 < 10MB
# ============================================================
services:
  # ==========================================================
  # API Gateway 服务
  # ==========================================================
  gateway:
    build:
      context: .
      dockerfile: aigateway-api/Dockerfile
    ports:
      - "8000:8000"
    # .env 注入:容器内 os.environ 同时含 .env 与下方 environment:
    # 优先级:environment: 段(覆盖) > .env > config.yaml
    env_file:
      - .env
    environment:
      - AI_GATEWAY_REDIS_URL=redis://redis:6379/0
      - AI_GATEWAY_QDRANT_URL=http://qdrant:6333
    volumes:
      - ./config.yaml:/app/config.yaml
      - code_graphs_data:/data/code_graphs
      - .:/workspace:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # GPU 透传（需宿主装 NVIDIA 驱动 + nvidia-container-toolkit）：
    # 让容器内 torch.cuda 可见 Tesla T4，用于 L3 向量计算 / prompt_compress。
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - gateway-net

  # ==========================================================
  # 前端控制面板
  # ==========================================================
  control-panel:
    build:
      context: ./control-panel
      dockerfile: ../Dockerfile.frontend
      args:
        VITE_API_BASE: /aigateway
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - gateway-net

  # ==========================================================
  # Redis — KV 缓存 + API Key 存储
  # ==========================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy volatile-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - gateway-net

  # ==========================================================
  # Qdrant — 向量数据库（L3 语义缓存）
  # ==========================================================
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - gateway-net

  # ==========================================================
  # Prometheus — 指标采集
  # ==========================================================
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped
    networks:
      - gateway-net

  # ==========================================================
  # Grafana — 可视化面板
  # ==========================================================
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge

volumes:
  redis-data:
  qdrant-data:
  grafana-data:
  prometheus-data:
  code_graphs_data:            # Code RAG: 每仓库一份 CodeGraph SQLite 图谱库
